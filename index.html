<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:400px;
}

h1{
color:#ff4081;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff4081;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e91e63;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="card">

<h1>🎂 Happy Birthday!</h1>

<p id="message">Hari ini spesial banget 🎉</p>

<button onclick="showSurprise()">Klik buat kejutan 🎁</button>

<p id="surprise" class="hidden">
Semoga semua impian kamu tercapai, selalu sehat, dan makin sukses! 💖
</p>

</div>

<script>

function showSurprise(){
document.getElementById("surprise").classList.remove("hidden");
}

</script>

</body>
</html>
